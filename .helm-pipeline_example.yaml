name: Automated ACR Helm Push Pipeline
on:
  push:
    branches:
      - Second_branch
env:
  ACR_NAME: devaksacr12345
jobs:
  build-and-push-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Authenticate Helm to ACR
        run: |
          USER_NAME="00000000-0000-0000-0000-000000000000"
          PASSWORD=$(az acr login --name ${{ env.ACR_NAME }} --expose-token --output tsv --query accessToken)
          echo "$PASSWORD" | helm registry login ${{ env.ACR_NAME }}.azurecr.io --username $USER_NAME --password-stdin
      # DYNAMIC STEP: Loops through your folders automatically
      - name: Discover, Package, and Push All Charts
        run: |
          echo "Starting automatic chart discovery..."
          # Find every directory that contains a Chart.yaml file
          find . -name "Chart.yaml" -exec dirname {} \; | while read -r chart_dir; do
            echo "--------------------------------------------------"
            echo "Found chart directory: $chart_dir"
            # 1. Package the chart into a .tgz bundle
            echo "Packaging chart..."
            helm package "$chart_dir" --destination .
            # 2. Push the newly created .tgz bundle straight to ACR
            echo "Pushing chart to Azure Container Registry..."
            helm push *.tgz oci://${{ env.ACR_NAME }}.azurecr.io/helm
            # 3. Clean up the local .tgz file so it doesn't interfere with the next loop
            rm *.tgz
          done
          echo "All charts have been processed successfully!"
