apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-workload
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:michaelcampbell-spec/Mtn-lehlohonono.git'
    targetRevision: HEAD
    path: workloads/grafana
  destination:
    server: 'https://default.svc'
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
