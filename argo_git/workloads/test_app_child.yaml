apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: azure-chart-deployment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'devaksacr12345.azurecr.io/helm'
    chart: test-prometheus
    targetRevision: 1.0.0
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
