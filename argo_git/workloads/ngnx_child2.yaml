apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx2-workload
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:michaelcampbell-spec/Mtn-lehlohonono.git'
    targetRevision: HEAD
    path: workloads/nginx2
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: second-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
